name: Build OpenWRT Node Packages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  SDK_DIR: ${{ github.workspace }}/sdk

jobs:
  build:
    name: mediatek/filogic (24.10.6)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenWRT build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache curl file gawk \
            g++-multilib gcc-multilib genisoimage git-core libdw-dev \
            libelf-dev libncurses5-dev locales python3 python3-pyelftools \
            rsync subversion swig unzip wget zstd

      - name: Download and extract OpenWRT SDK
        run: |
          TARGET="mediatek/filogic"
          VERSION="24.10.6"
          BASE_URL="https://downloads.openwrt.org/releases/$VERSION/targets/$TARGET"

          mkdir -p "$SDK_DIR"
          cd "$SDK_DIR"

          wget -nv "$BASE_URL/sha256sums" -O sha256sums

          SDK_FILE=$(grep -oP 'openwrt-sdk-[^ ]+Linux-x86_64\.tar\.(xz|zst)' sha256sums | head -1)
          echo "SDK: $SDK_FILE"

          wget -nv "$BASE_URL/$SDK_FILE"
          grep -F "$SDK_FILE" sha256sums | sha256sum -c

          tar xf "$SDK_FILE" --strip=1 --no-same-owner
          rm -f "$SDK_FILE" sha256sums

      - name: Add node feed
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "src-git-full node https://github.com/nxhack/openwrt-node-packages.git" >> feeds.conf
          ./scripts/feeds update node
          ./scripts/feeds update packages

      - name: Install node packages and configure
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds install -a
          make defconfig
          echo 'CONFIG_NODEJS_HOST_BIN=y' >> .config
          make defconfig

      - name: Build core dependencies (libopenssl, zlib, icu, etc.)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "=== Building node dependencies from packages feed ==="
          for dep in libopenssl zlib libnghttp2 libcares icu icu-full-data; do
            echo "--- Building dep: $dep ---"
            make "package/feeds/packages/$dep/compile" -j$(nproc) \
              IGNORE_ERRORS=1 BUILD_LOG=1 V=s CONFIG_AUTOREMOVE=y || true
          done
          echo "=== Running make package/index to generate feed metadata ==="
          make package/index V=s || true

      - name: Build ALL node packages
        working-directory: ${{ env.SDK_DIR }}
        run: |
          for pkg in feeds/node/*/; do
            pkgname=$(basename "$pkg")
            echo "=== Building $pkgname ==="
            make "package/feeds/node/$pkgname/compile" -j$(nproc) \
              IGNORE_ERRORS=1 BUILD_LOG=1 V=s CONFIG_AUTOREMOVE=y || true
          done

      - name: List built packages, sign index, and prepare feed
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "=== IPK packages ==="
          find bin/packages/ -name "*.ipk" 2>/dev/null | sort || true
          echo ""
          echo "Total: $(find bin/packages/ -name '*.ipk' 2>/dev/null | wc -l)"
          echo ""
          echo "=== Package index ==="
          find bin/packages/ -name "Packages*" 2>/dev/null || true
          echo ""
          echo "=== Package signature ==="
          find bin/packages/ -name "*.sig" 2>/dev/null || echo "No .sig files found"
          echo ""
          echo "=== Publish public key to feed ==="
          if [ -f key-build.pub ]; then
            cp key-build.pub bin/packages/aarch64_cortex-a53/
            echo "key-build.pub copied to feed root"
          else
            echo "No key-build.pub available"
          fi
          echo ""
          echo "=== Directory structure ==="
          find bin/packages/ -type d 2>/dev/null | sort || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.SDK_DIR }}/bin/packages
          destination_dir: packages

      - name: Upload packages as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipk-packages-aarch64_cortex-a53
          path: ${{ env.SDK_DIR }}/bin/packages/aarch64_cortex-a53/node/*.ipk

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ${{ env.SDK_DIR }}/logs/
