name: Build OpenWRT Node Packages

on:
  workflow_dispatch:

env:
  SDK_DIR: ${{ github.workspace }}/sdk

jobs:
  build:
    name: mediatek/filogic (24.10.6)
    runs-on: ubuntu-latest
    timeout-minutes: 480
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Install OpenWRT build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache curl file gawk \
            g++-multilib gcc-multilib genisoimage git-core libdw-dev \
            libelf-dev libncurses5-dev locales python3 python3-pyelftools \
            rsync subversion swig unzip wget zstd

      - name: Cache OpenWRT SDK
        id: sdk-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.SDK_DIR }}
          key: openwrt-sdk-24.10.6-mediatek-filogic-1

      - name: Download and extract OpenWRT SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          TARGET="mediatek/filogic"
          VERSION="24.10.6"
          BASE_URL="https://downloads.openwrt.org/releases/$VERSION/targets/$TARGET"

          mkdir -p "$SDK_DIR"
          cd "$SDK_DIR"

          wget -nv "$BASE_URL/sha256sums" -O sha256sums

          SDK_FILE=$(grep -oP 'openwrt-sdk-[^ ]+Linux-x86_64\.tar\.(xz|zst)' sha256sums | head -1)
          echo "SDK: $SDK_FILE"

          wget -nv "$BASE_URL/$SDK_FILE"
          grep -F "$SDK_FILE" sha256sums | sha256sum -c

          tar xf "$SDK_FILE" --strip=1 --no-same-owner
          rm -f "$SDK_FILE" sha256sums

      - name: Cache SDK dl directory
        uses: actions/cache@v5
        with:
          path: ${{ env.SDK_DIR }}/dl
          key: dl-cache-${{ github.run_id }}
          restore-keys: |
            dl-cache-

      - name: Add node feed
        working-directory: ${{ env.SDK_DIR }}
        run: |
          # Always start fresh feeds.conf from default
          cp feeds.conf.default feeds.conf
          echo "src-git-full node https://github.com/nxhack/openwrt-node-packages.git^openwrt-24.10" >> feeds.conf
          # feeds update may fail for 'base' (detached HEAD from SDK tarball) — ignore
          # Other built-in feeds (packages, luci, routing, telephony) are pinned commits, fine
          # The 'node' feed is what we actually need
          ./scripts/feeds update -a || true

      - name: Install node packages and configure
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds install -a
          # Remove packages feed's node (v20) so nxhack's node (v22 default) wins
          rm -rf package/feeds/packages/node*
          ./scripts/feeds install -f -a -p node
          make defconfig
          echo 'CONFIG_NODEJS_22=y' >> .config
          echo 'CONFIG_NODEJS_HOST_BIN=y' >> .config
          echo 'CONFIG_CCACHE=y' >> .config
          make defconfig

      - name: Build all node packages
        working-directory: ${{ env.SDK_DIR }}
        run: |
          rm -rf bin/
          echo "=== Building all node feed packages ==="
          targets=""
          for d in package/feeds/node/*/; do
            pkg="$(basename $d)"
            targets="$targets package/feeds/node/$pkg/compile"
          done
          make $targets -j$(nproc) IGNORE_ERRORS=1 \
            BUILD_LOG=1 V=0 CONFIG_AUTOREMOVE=y

      - name: Generate package index and signing
        working-directory: ${{ env.SDK_DIR }}
        run: |
          # Decode private signing key from GitHub Secret (never committed to repo)
          if [ -n "${{ secrets.OPKG_SIGN_KEY }}" ]; then
            echo "${{ secrets.OPKG_SIGN_KEY }}" | base64 -d > key-build
          else
            echo "WARNING: OPKG_SIGN_KEY secret not set — packages will NOT be signed"
          fi
          # Copy public key from repo checkout (safe to commit — it's public)
          cp -v ${{ github.workspace }}/key-build.pub .

          echo "=== Generating package index ==="
          make package/index V=s || true
          echo ""
          echo "=== IPK packages ==="
          find bin/packages/ -name "*.ipk" 2>/dev/null | sort || true
          echo ""
          echo "Total: $(find bin/packages/ -name '*.ipk' 2>/dev/null | wc -l)"
          echo ""
          echo "=== Package index ==="
          find bin/packages/ -name "Packages*" 2>/dev/null || true
          echo ""
          echo "=== Package signature ==="
          find bin/packages/ -name "*.sig" 2>/dev/null || echo "No .sig files found"
          echo ""
          echo "=== Publish public key to feed ==="
          cp key-build.pub bin/packages/aarch64_cortex-a53/
          echo "key-build.pub copied to feed root"
          echo ""
          echo "=== Directory structure ==="
          find bin/packages/ -type d 2>/dev/null | sort || true

      - name: Remove non-node feeds before deploy
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "=== Removing non-node feeds (available in official OpenWRT repos) ==="
          ls -d bin/packages/aarch64_cortex-a53/*/
          rm -rf bin/packages/aarch64_cortex-a53/{base,luci,packages,routing,telephony}
          echo ""
          echo "=== Remaining structure ==="
          find bin/packages/aarch64_cortex-a53/ -type d | sort

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.SDK_DIR }}/bin/packages
          destination_dir: packages

      - name: Upload packages as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ipk-packages-aarch64_cortex-a53
          path: ${{ env.SDK_DIR }}/bin/packages/aarch64_cortex-a53/node/*.ipk

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs
          path: ${{ env.SDK_DIR }}/logs/
