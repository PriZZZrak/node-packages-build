name: Build OpenWRT Node Packages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: mediatek/filogic (aarch64_cortex-a53)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: openwrt/sdk:aarch64_cortex-a53-24.10.6
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Setup SDK buildroot
        run: |
          if [ ! -d ./scripts ]; then
            SDK_FILE="openwrt-sdk-24.10.6-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
            echo "Downloading SDK for mediatek/filogic..."
            curl -sL "https://downloads.openwrt.org/releases/24.10.6/targets/mediatek/filogic/${SDK_FILE}" -o "/tmp/${SDK_FILE}"
            echo "Extracting SDK..."
            tar --zstd -xf "/tmp/${SDK_FILE}" --strip=1 --no-same-owner
            rm -f "/tmp/${SDK_FILE}"
            echo "SDK setup complete."
          fi

      - name: Setup custom feeds
        run: |
          echo "src-git node https://github.com/nxhack/openwrt-node-packages.git" >> feeds.conf
          ./scripts/feeds update -a
          rm -rf package/feeds/packages/node*
          ./scripts/feeds install -a -p node

      - name: Generate package signing key
        run: |
          if [ -f staging_dir/host/bin/usign ] && [ ! -f key-build ]; then
            staging_dir/host/bin/usign -G -s key-build -p key-build.pub \
              -c "node-packages-build key $(date +%Y-%m-%d)"
            echo "✅ Signing key generated: key-build + key-build.pub"
            echo "Fingerprint: $(staging_dir/host/bin/usign -F -p key-build.pub)"
          else
            echo "ℹ️  usign not found or key already exists"
            ls -la key-build 2>/dev/null || echo "key-build missing"
          fi

      - name: Configure ALL packages
        run: |
          make defconfig
          sed -i 's/# CONFIG_ALL is not set/CONFIG_ALL=y/' .config 2>/dev/null || \
            echo 'CONFIG_ALL=y' >> .config
          make defconfig
          echo 'CONFIG_NODEJS_HOST_BIN=y' >> .config
          make defconfig
          mkdir -p staging_dir/hostpkg

      - name: Patch node Makefile — use bundled OpenSSL (delete --shared-openssl)
        run: |
          NODE_MAKEFILE="package/feeds/node/node/Makefile"
          if [ -f "$NODE_MAKEFILE" ]; then
            # Delete --shared-openssl line entirely (invalid flag causes configure to error)
            sed -i '/--shared-openssl/d' "$NODE_MAKEFILE"
            # Also remove +libopenssl from DEPENDS (no system OpenSSL needed)
            sed -i 's/ +libopenssl//g' "$NODE_MAKEFILE"
            echo "✅ Patched $NODE_MAKEFILE: --shared-openssl deleted, +libopenssl removed"
            grep -E "openssl|shared" "$NODE_MAKEFILE" || echo "(no openssl references remain)"
          else
            echo "⚠️  $NODE_MAKEFILE not found"
          fi

      - name: Build ALL node packages
        run: |
          make -j$(nproc) IGNORE_ERRORS=1 BUILD_LOG=1 V=0 CONFIG_AUTOREMOVE=y || true

      - name: Debug - verify OpenSSL & node headers, rebuild zigbee2mqtt
        if: always()
        run: |
          echo "=== Checking OpenSSL staging headers ==="
          find staging_dir/ -name "bio.h" -path "*/openssl/*" 2>/dev/null | head -5
          if [ -z "$(find staging_dir/ -name 'bio.h' -path '*/openssl/*' 2>/dev/null)" ]; then
            echo "❌ MISSING: OpenSSL headers in staging"
          else
            echo "✅ OpenSSL headers found in staging"
          fi
          echo ""
          echo "=== Checking node staging headers ==="
          find staging_dir/ -name "node.h" -path "*/include/node/*" 2>/dev/null | head -5
          if [ -z "$(find staging_dir/ -name 'node.h' -path '*/include/node/*' 2>/dev/null)" ]; then
            echo "❌ MISSING: node.h in staging — native modules cannot compile!"
          else
            echo "✅ node headers found in staging"
          fi
          echo ""
          echo "=== ARCH / NODEJS_CPU ==="
          grep "^CONFIG_ARCH\|^CONFIG_TARGET_ARCH" .config 2>/dev/null | head -5
          echo ""
          echo "=== Retrying node-zigbee2mqtt with V=99 ==="
          make package/feeds/node/node-zigbee2mqtt/compile V=99 2>&1 || true
          echo ""
          echo "=== Also checking bufferutil and utf-8-validate (key deps) ==="
          make package/feeds/node/node-bufferutil/compile V=99 2>&1 || true
          echo "---"
          make package/feeds/node/node-utf-8-validate/compile V=99 2>&1 || true

      - name: List built packages, sign index, and prepare feed
        run: |
          echo "=== IPK packages ==="
          find bin/packages/ -name "*.ipk" 2>/dev/null | sort || true
          echo ""
          echo "Total: $(find bin/packages/ -name '*.ipk' 2>/dev/null | wc -l)"
          echo ""
          echo "=== Package index (generated by make world) ==="
          find bin/packages/ -name "Packages*" 2>/dev/null || true
          echo ""
          echo "=== Package signature ==="
          find bin/packages/ -name "*.sig" 2>/dev/null || echo "No .sig files found"
          echo ""
          echo "=== Publish public key to feed ==="
          if [ -f key-build.pub ]; then
            cp key-build.pub bin/packages/aarch64_cortex-a53/
            echo "✅ key-build.pub copied to feed root"
          else
            echo "❌ No key-build.pub available"
          fi
          echo ""
          echo "=== Directory structure ==="
          find bin/packages/ -type d 2>/dev/null | sort || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./bin/packages
          destination_dir: packages

      - name: Upload packages as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipk-packages-aarch64_cortex-a53
          path: bin/packages/aarch64_cortex-a53/node/*.ipk

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ./logs/
