name: Build OpenWRT Node Packages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: mediatek/filogic (24.10.6)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: openwrt/sdk:mediatek-filogic-24.10.6
      options: --user root
    defaults:
      run:
        working-directory: /builder
    steps:
      - uses: actions/checkout@v4

      - name: Add node feed and update packages feed
        run: |
          echo "src-git-full node https://github.com/nxhack/openwrt-node-packages.git" >> feeds.conf
          ./scripts/feeds update node
          ./scripts/feeds update packages

      - name: Install node packages and configure
        run: |
          ./scripts/feeds install -a -p node
          # feed install doesn't create symlinks in package/feeds/node/,
          # so make them manually so the build system can find each package
          mkdir -p package/feeds/node
          for pkg in feeds/node/*/; do
            pkgname=$(basename "$pkg")
            [ -L "package/feeds/node/$pkgname" ] || \
              ln -sf "../../../feeds/node/$pkgname" "package/feeds/node/$pkgname"
          done
          ls -la package/feeds/node/ | head -20
          make defconfig
          echo 'CONFIG_NODEJS_HOST_BIN=y' >> .config
          make defconfig

      - name: Build ALL node packages
        run: |
          for pkg in feeds/node/*/; do
            pkgname=$(basename "$pkg")
            echo "=== Building $pkgname ==="
            # Skip clean — fresh SDK container each run, and CONFIG_AUTOREMOVE=y
            # handles cleanup after successful builds. Running clean+compile with
            # -j$(nproc) can cause a race condition where both targets run in parallel.
            make "package/feeds/node/$pkgname/compile" -j$(nproc) \
              IGNORE_ERRORS=1 BUILD_LOG=1 V=s CONFIG_AUTOREMOVE=y || true
          done

      - name: List built packages, sign index, and prepare feed
        run: |
          echo "=== IPK packages ==="
          find bin/packages/ -name "*.ipk" 2>/dev/null | sort || true
          echo ""
          echo "Total: $(find bin/packages/ -name '*.ipk' 2>/dev/null | wc -l)"
          echo ""
          echo "=== Package index ==="
          find bin/packages/ -name "Packages*" 2>/dev/null || true
          echo ""
          echo "=== Package signature ==="
          find bin/packages/ -name "*.sig" 2>/dev/null || echo "No .sig files found"
          echo ""
          echo "=== Publish public key to feed ==="
          if [ -f key-build.pub ]; then
            cp key-build.pub bin/packages/aarch64_cortex-a53/
            echo "✅ key-build.pub copied to feed root"
          else
            echo "ℹ️  No key-build.pub available (usign may not be in PATH)"
          fi
          echo ""
          echo "=== Directory structure ==="
          find bin/packages/ -type d 2>/dev/null | sort || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: \${{ secrets.GITHUB_TOKEN }}
          publish_dir: /builder/bin/packages
          destination_dir: packages

      - name: Upload packages as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipk-packages-aarch64_cortex-a53
          path: /builder/bin/packages/aarch64_cortex-a53/node/*.ipk

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /builder/logs/
