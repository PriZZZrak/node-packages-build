name: Check Upstream Updates

on:
  schedule:
    - cron: '0 6 * * *'   # ежедневно в 6:00 UTC
  workflow_dispatch:        # можно запустить вручную

jobs:
  check:
    name: Check nxhack/openwrt-node-packages
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Get timestamp of last successful build
        id: last-build
        run: |
          LAST=$(gh run list --workflow build.yml --branch main --status success \
            --limit 1 --json createdAt --jq '.[0].createdAt')
          if [ -z "$LAST" ] || [ "$LAST" = "null" ]; then
            echo "No previous successful build found — will trigger"
            echo "since=1970-01-01T00:00:00Z" >> "$GITHUB_OUTPUT"
          else
            echo "Last successful build: $LAST"
            echo "since=$LAST" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for new upstream commits since last build
        id: check
        run: |
          SINCE="${{ steps.last-build.outputs.since }}"
          echo "Checking nxhack/openwrt-node-packages master since $SINCE"

          COMMITS=$(curl -s \
            "https://api.github.com/repos/nxhack/openwrt-node-packages/commits?sha=master&since=${SINCE}&per_page=1" \
            | jq -r 'if type == "array" then length else 0 end')

          if [ "$COMMITS" -gt 0 ]; then
            LATEST=$(curl -s \
              "https://api.github.com/repos/nxhack/openwrt-node-packages/commits?sha=master&per_page=1" \
              | jq -r '.[0].sha')
            echo "Found $COMMITS new commit(s). Latest: $LATEST"
            echo "trigger=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new upstream commits since last build"
            echo "trigger=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger build
        if: steps.check.outputs.trigger == 'true'
        run: |
          echo "Triggering build workflow..."
          gh workflow run build.yml --ref main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
